name: Build Windows App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download PHP Desktop
        shell: pwsh
        run: |
          $url = "https://github.com/cztomczak/phpdesktop/releases/download/chrome-v130.1/phpdesktop-chrome-130.1-php-8.3.zip"
          Invoke-WebRequest -Uri $url -OutFile phpdesktop.zip
          Expand-Archive -Path phpdesktop.zip -DestinationPath phpdesktop -Force
          $dir = (Get-ChildItem phpdesktop -Directory | Select-Object -First 1).FullName
          "PHPDESKTOP_DIR=$dir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Assemble app
        shell: pwsh
        run: |
          $root = $env:PHPDESKTOP_DIR
          Remove-Item -Recurse -Force "$root\www"
          Copy-Item -Recurse "www" "$root\www"
          Copy-Item -Force "settings.json" "$root\settings.json"
          Rename-Item "$root\phpdesktop-chrome.exe" "TimetableSystem.exe"
          New-Item -ItemType Directory -Force -Path "$root\www\tmp" | Out-Null

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $root = $env:PHPDESKTOP_DIR
          Compress-Archive -Path "$root\*" -DestinationPath "TimetableSystem-Portable.zip" -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TimetableSystem-Windows
          path: |
            TimetableSystem-Setup.exe
            TimetableSystem-Portable.zip

      - name: Commit builds to repo
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "TimetableSystem-Setup.exe" "release\" -Force
          Copy-Item "TimetableSystem-Portable.zip" "release\" -Force
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add release/*
          git commit -m "Build Windows app"
          git push
